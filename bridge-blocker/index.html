<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>堵桥模拟器 v0.1</title>
<style>
  body { margin:0; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; font-family: -apple-system, sans-serif; color:#eee; }
  h1 { margin: 12px; font-size: 18px; }
  canvas { background:#3a4d3a; border: 2px solid #555; image-rendering: pixelated; }
  .hint { margin: 8px; color:#999; font-size: 13px; }
  .panel { background:#222; border:1px solid #444; border-radius:8px; padding:12px 16px; margin:10px; display:flex; flex-direction:column; gap:8px; min-width:520px; }
  .panel h3 { margin:0 0 6px; font-size:14px; color:#ffd633; }
  .row { display:flex; align-items:center; gap:10px; font-size:13px; }
  .row label { min-width:120px; color:#ccc; }
  .row input[type=range] { flex:1; }
  .row input[type=number] { width:70px; background:#111; color:#fff; border:1px solid #555; border-radius:4px; padding:3px 6px; font-size:13px; }
  .row .pct { min-width:60px; text-align:right; color:#7CFC00; font-variant-numeric: tabular-nums; }
  .row .note { color:#888; font-size:12px; }
  .toggle { display:flex; align-items:center; gap:6px; color:#ccc; }
</style>
</head>
<body>
  <h1>堵桥模拟器 — 里程碑 2：乌鲁鲁开火！</h1>
  <canvas id="game" width="640" height="800"></canvas>
  <div class="hint">点击画面任何地方，乌鲁鲁就朝那里开枪</div>

  <div class="panel">
    <h3>⚙️ 调节面板</h3>
    <div class="row">
      <label>爆头范围</label>
      <input id="headRange" type="range" min="0" max="1" step="0.01" value="0.30">
      <input id="headNumber" type="number" min="0" max="1" step="0.01" value="0.30">
      <span id="headPct" class="pct">30%</span>
    </div>
    <div class="row">
      <span class="note">数值 = 头部占敌人身高的比例。0.10 = 只有头顶一点点；0.50 = 整个上半身都算头</span>
    </div>
    <div class="row">
      <label class="toggle"><input id="showHeadZone" type="checkbox" checked> 在画面上显示爆头区</label>
    </div>
    <div class="row">
      <label>每位最多几个</label>
      <input id="maxPerRange" type="range" min="1" max="6" step="1" value="2">
      <input id="maxPerNumber" type="number" min="1" max="20" step="1" value="2">
      <span id="maxPerPct" class="pct">2 个</span>
    </div>
    <div class="row">
      <span class="note">每个终点位置最多同时站这么多人；满了就要先清掉，下一波才会补</span>
    </div>
  </div>

<script>
// ====== ✨ 改这里！画面参数 ======
const W = 640, H = 800;
const ROAD_COLOR   = '#3a3a3a';   // 马路路面颜色
const LANE_COLOR   = '#f5d142';   // 马路黄线颜色
const GRASS_COLOR  = '#3a4d3a';   // 草地颜色
const BRIDGE_COLOR = '#8b6f47';   // 桥木板颜色
const PLANK_COLOR  = '#6b5436';   // 木板缝颜色
const BRIDGE_WIDTH = 160;         // 桥多宽（孩子可以改成 80 试试看）
const BRIDGE_X     = 120;         // 桥距离左边多远（孩子可以改：变小 = 更靠左）
// ================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function drawScene() {
  // 1) 整个画面先画成草地
  ctx.fillStyle = GRASS_COLOR;
  ctx.fillRect(0, 0, W, H);

  // 2) 中间一条马路（横着的）
  const riverY = 200, riverH = 400;
  ctx.fillStyle = ROAD_COLOR;
  ctx.fillRect(0, riverY, W, riverH);

  // 2.5) 马路中间的黄色虚线（横着一段一段）
  ctx.strokeStyle = LANE_COLOR;
  ctx.lineWidth = 4;
  ctx.setLineDash([20, 18]);
  ctx.beginPath();
  ctx.moveTo(0, riverY + riverH / 2);
  ctx.lineTo(W, riverY + riverH / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // 3) 马路上一座桥（竖着架在马路上）
  const bx = BRIDGE_X;
  ctx.fillStyle = BRIDGE_COLOR;
  ctx.fillRect(bx, riverY, BRIDGE_WIDTH, riverH);

  // 4) 桥上的木板纹理（一条条横线）
  ctx.strokeStyle = PLANK_COLOR;
  ctx.lineWidth = 2;
  for (let y = riverY + 20; y < riverY + riverH; y += 20) {
    ctx.beginPath();
    ctx.moveTo(bx, y);
    ctx.lineTo(bx + BRIDGE_WIDTH, y);
    ctx.stroke();
  }

  // 5) 桥栏杆（两条竖线）
  ctx.strokeStyle = '#4a3a26';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(bx, riverY); ctx.lineTo(bx, riverY + riverH);
  ctx.moveTo(bx + BRIDGE_WIDTH, riverY); ctx.lineTo(bx + BRIDGE_WIDTH, riverY + riverH);
  ctx.stroke();

  // 6) 桥右边的三个方块掩体（摆成三角形：尖朝桥）
  ctx.fillStyle = '#555';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  const coverSize = 80;   // ✨ 改这里！每块掩体多大
  const coverGap  = 80;   // ✨ 改这里！方块之间留多大缝（越大越散，但右侧敌人会被裁掉）
  const offsetX   = 40;   // ✨ 改这里！整组三角再往桥右边挪多远
  const baseX  = bx + BRIDGE_WIDTH + offsetX + coverSize + coverGap; // 后排两个的 X
  const midY   = riverY + riverH / 2;                                 // 三角形中线
  // 后排两块（上下分开）
  const topY = midY - coverSize - coverGap / 2;
  const botY = midY + coverGap / 2;
  // 前排一块（朝桥那侧，居中）
  const frontX = bx + BRIDGE_WIDTH + offsetX;
  const frontY = midY - coverSize / 2;
  const triangle = [
    [baseX,  topY],
    [baseX,  botY],
    [frontX, frontY],
  ];
  for (const [x, y] of triangle) {
    ctx.fillRect(x, y, coverSize, coverSize);
    ctx.strokeRect(x, y, coverSize, coverSize);
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => { computeTightBounds(img); resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

// 扫描图片像素，找出真正"不透明"的紧密包围盒（去掉四周的透明空白）
// 把比例存到 img._tight = { topR, botR, leftR, rightR }（相对原图的 0..1）
function computeTightBounds(img) {
  const W0 = img.naturalWidth, H0 = img.naturalHeight;
  const off = document.createElement('canvas');
  off.width = W0; off.height = H0;
  const c = off.getContext('2d');
  c.drawImage(img, 0, 0);
  const data = c.getImageData(0, 0, W0, H0).data;
  const ALPHA_MIN = 16;
  let top = H0, bot = -1, left = W0, right = -1;
  for (let y = 0; y < H0; y++) {
    for (let x = 0; x < W0; x++) {
      if (data[(y * W0 + x) * 4 + 3] > ALPHA_MIN) {
        if (y < top) top = y;
        if (y > bot) bot = y;
        if (x < left)  left = x;
        if (x > right) right = x;
      }
    }
  }
  if (bot < 0) { // 全透明，回退到原图
    img._tight = { topR: 0, botR: 1, leftR: 0, rightR: 1 };
  } else {
    img._tight = {
      topR:  top   / H0,
      botR:  (bot + 1) / H0,
      leftR: left  / W0,
      rightR:(right + 1) / W0,
    };
  }
}

function drawSoldier(img, cx, cy, height, name, color) {
  const w = height * (img.naturalWidth / img.naturalHeight);
  ctx.drawImage(img, cx - w / 2, cy - height / 2, w, height);
  if (name) {
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.fillStyle = color;
    ctx.strokeText(name, cx, cy - height / 2 - 4);
    ctx.fillText(name, cx, cy - height / 2 - 4);
  }
}

// 决定下一个生成的敌人是步枪手还是狙击手
// 每三个敌人里 1 个狙击手（counter 0,3,6,... 是狙击手）
function nextEnemyKind() {
  const isSniper = (game.enemyCounter % 3) === 0;
  game.enemyCounter++;
  return isSniper ? 'sniper' : 'rifle';
}

// 给一个敌人对象补上"职业"相关字段
function applyEnemyKind(e, kind) {
  e.kind = kind;
  e.bodyDmg = kind === 'sniper' ? SNIPER_BODY_DMG : RIFLE_BODY_DMG;
  e.headDmg = kind === 'sniper' ? SNIPER_HEAD_DMG : RIFLE_HEAD_DMG;
  // 错开开火时间，避免所有敌人同时开枪
  e.nextFireAt = performance.now() + ENEMY_FIRE_INTERVAL_MS * (0.5 + Math.random());
}

// 敌人的包围盒：用紧贴像素的 tight bounds，去掉透明空白
function enemyBox(e) {
  const W0 = e.img.naturalWidth, H0 = e.img.naturalHeight;
  const Wd = e.height * (W0 / H0);   // 整张图绘制后的宽
  const Hd = e.height;                // 整张图绘制后的高
  const drawnLeft = e.x - Wd / 2;
  const drawnTop  = e.y - Hd / 2;
  const t = e.img._tight || { topR: 0, botR: 1, leftR: 0, rightR: 1 };
  const left   = drawnLeft + Wd * t.leftR;
  const right  = drawnLeft + Wd * t.rightR;
  const top    = drawnTop  + Hd * t.topR;
  const bottom = drawnTop  + Hd * t.botR;
  return {
    left, right, top, bottom,
    headBottom: top + (bottom - top) * HEAD_RATIO,
  };
}

function spawnEffect(fx) {
  fx.born = performance.now();
  game.effects.push(fx);
}

function spawnBullet(targetX, targetY) {
  const now = performance.now();
  if (now - game.player.lastFire < FIRE_COOLDOWN) return;
  game.player.lastFire = now;

  const muzzleX = game.player.x;
  const muzzleY = game.player.y - SOLDIER_HEIGHT * 0.2;
  const dx = targetX - muzzleX;
  const dy = targetY - muzzleY;
  const dist = Math.hypot(dx, dy) || 1;
  game.bullets.push({
    x: muzzleX,
    y: muzzleY,
    vx: (dx / dist) * BULLET_SPEED,
    vy: (dy / dist) * BULLET_SPEED,
    team: 'player',
  });
  spawnEffect({ kind: 'muzzle', x: muzzleX, y: muzzleY, life: 90 });
}

// 威龙开火：随机锁一个敌人，50% 命中爆头，50% 空枪打偏
function allyFire() {
  if (!game.ally || game.ally.hp <= 0) return;
  const targets = game.enemies.filter(e => e.hp > 0 && !e.friendly);
  if (!targets.length) return;
  const target = targets[Math.floor(Math.random() * targets.length)];
  const willHit = Math.random() < ALLY_HIT_RATE;

  const muzzleX = game.ally.x;
  const muzzleY = game.ally.y + SOLDIER_HEIGHT * 0.2;
  // 锁敌人头部
  const box = enemyBox(target);
  let aimX = (box.left + box.right) / 2;
  let aimY = box.top + (box.bottom - box.top) * HEAD_RATIO * 0.5;
  if (!willHit) {
    // 空枪：故意打偏一截，不会碰到敌人
    aimX += (Math.random() < 0.5 ? -1 : 1) * (60 + Math.random() * 40);
    aimY += (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 30);
  }
  const dx = aimX - muzzleX, dy = aimY - muzzleY;
  const dist = Math.hypot(dx, dy) || 1;
  game.bullets.push({
    x: muzzleX,
    y: muzzleY,
    vx: (dx / dist) * ALLY_BULLET_SPEED,
    vy: (dy / dist) * ALLY_BULLET_SPEED,
    team: 'ally',
    forceHead: willHit, // 命中那枪强制爆头判定
    harmless: !willHit, // 空枪：飞过去但绝不造成伤害（碰撞检测会跳过）
  });
  spawnEffect({ kind: 'muzzle', x: muzzleX, y: muzzleY, life: 90 });
}

function damageFriendly(target, dmg, who) {
  target.hp = Math.max(0, target.hp - dmg);
  target.hitFlash = performance.now();
  spawnEffect({
    kind: 'damage', x: target.x, y: target.y - SOLDIER_HEIGHT * 0.4,
    text: '-' + dmg, head: false, life: 700,
  });
  if (target.hp <= 0 && !game.over) {
    game.over = true;
    game.overAt = performance.now();
    game.overReason = (who === 'player' ? '乌鲁鲁' : '威龙') + ' 倒下了';
  }
}

function updateBullets() {
  const alive = [];
  for (const b of game.bullets) {
    b.x += b.vx;
    b.y += b.vy;

    // 敌方子弹：检测命中玩家或队友（按 mode 决定伤害）
    if (b.team === 'enemy') {
      if (!b.harmless && b.mode !== 'miss') {
        const target = b.targetWho === 'player' ? game.player
                     : (game.ally && game.ally.hp > 0 ? game.ally : null);
        if (target && target.hp > 0) {
          const tbox = friendlyBox(target);
          if (b.x >= tbox.left && b.x <= tbox.right && b.y >= tbox.top && b.y <= tbox.bottom) {
            const isHead = b.mode === 'head';
            const dmg = isHead ? b.shooter.headDmg : b.shooter.bodyDmg;
            damageFriendly(target, dmg, b.targetWho);
            spawnEffect({ kind: 'spark', x: b.x, y: b.y, life: 200 });
            continue;
          }
        }
      }
      // 空枪 / 没碰到 → 飞出画面就丢
      if (b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20) alive.push(b);
      continue;
    }

    // 玩家 / 队友子弹：命中敌人（队友空枪带 harmless 标记，碰撞跳过）
    let hit = null;
    if (!b.harmless) {
      for (const e of game.enemies) {
        if (e.hp <= 0) continue;
        if (e.friendly) continue;
        const box = enemyBox(e);
        if (b.x >= box.left && b.x <= box.right && b.y >= box.top && b.y <= box.bottom) {
          hit = { enemy: e, box };
          break;
        }
      }
    }

    if (hit) {
      const isHead = b.forceHead || (b.y <= hit.box.headBottom);
      const dmg = isHead ? HEAD_DAMAGE : BODY_DAMAGE;
      hit.enemy.hp = Math.max(0, hit.enemy.hp - dmg);
      hit.enemy.hitFlash = performance.now();
      if (hit.enemy.hp <= 0 && !hit.enemy.deadAt) {
        hit.enemy.deadAt = performance.now();
        game.kills++;
      }
      // 伤害数字飘字 + 命中火花
      spawnEffect({
        kind: 'damage', x: b.x, y: b.y - 6,
        text: (isHead ? '暴击 ' : '') + dmg,
        head: isHead, life: 700,
      });
      spawnEffect({ kind: 'spark', x: b.x, y: b.y, life: 200 });
      continue; // 子弹消失
    }

    // 飞出画面就丢
    if (b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20) alive.push(b);
  }
  game.bullets = alive;
}

function drawBullets() {
  ctx.lineWidth = 2;
  for (const b of game.bullets) {
    if (b.team === 'ally') {
      ctx.fillStyle = ALLY_BULLET_COLOR;
      ctx.strokeStyle = '#1a4a66';
    } else if (b.team === 'enemy') {
      ctx.fillStyle = ENEMY_BULLET_COLOR;
      ctx.strokeStyle = '#660000';
    } else {
      ctx.fillStyle = BULLET_COLOR;
      ctx.strokeStyle = '#a06b00';
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
}

function drawBigHpBar(label, hp, maxHp, x, y, w, h, color) {
  const ratio = Math.max(0, hp / maxHp);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = ratio > 0.5 ? color : ratio > 0.25 ? '#ffd633' : '#ff5050';
  ctx.fillRect(x, y, w * ratio, h);
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(label + ' ' + Math.ceil(hp) + '/' + maxHp, x + 6, y + h / 2);
}

function drawHUD() {
  ctx.save();
  // 顶栏背景
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 70);

  // 击杀数
  ctx.font = 'bold 18px -apple-system, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd633';
  ctx.fillText('💀 击杀 ' + game.kills, 12, 16);

  // 用时
  const sec = Math.max(0, Math.floor(((game.over ? game.overAt : performance.now()) - game.startedAt) / 1000));
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(sec % 60).padStart(2, '0');
  ctx.textAlign = 'right';
  ctx.fillStyle = '#7CFC00';
  ctx.fillText('⏱ ' + mm + ':' + ss, W - 12, 16);

  // 玩家 / 队友血条
  drawBigHpBar('乌鲁鲁', game.player.hp, PLAYER_MAX_HP, 12, 38, 280, 20, '#7CFC00');
  if (game.ally) {
    drawBigHpBar('威龙',   game.ally.hp,   ALLY_MAX_HP,   W - 292, 38, 280, 20, '#5ad6ff');
  }

  // 烟雾技能状态（顶栏正中）
  const now = performance.now();
  ctx.font = 'bold 13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (now < game.smokeUntil) {
    const left = Math.ceil((game.smokeUntil - now) / 1000);
    ctx.fillStyle = '#cfd2d6';
    ctx.fillText('🌫 烟雾中 ' + left + 's', W / 2, 16);
  } else if (now < game.smokeReadyAt) {
    const left = Math.ceil((game.smokeReadyAt - now) / 1000);
    ctx.fillStyle = '#888';
    ctx.fillText('🌫 冷却 ' + left + 's', W / 2, 16);
  } else {
    ctx.fillStyle = '#7CFC00';
    ctx.fillText('🌫 烟雾就绪 · 点蜂医释放', W / 2, 16);
  }

  ctx.restore();
}

function drawSniperMark(e) {
  if (e.kind !== 'sniper' || e.hp <= 0) return;
  const box = enemyBox(e);
  ctx.save();
  ctx.font = 'bold 12px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.fillStyle = '#ff66ff';
  const tx = e.x, ty = box.top - 18;
  ctx.strokeText('🎯 狙击手', tx, ty);
  ctx.fillText('🎯 狙击手', tx, ty);
  ctx.restore();
}

// 开始按钮的位置/尺寸（点击检测会用）
const START_BTN = { x: W / 2 - 110, y: H / 2 + 40, w: 220, h: 60 };

function drawStartMenu() {
  if (game.started) return;
  ctx.save();
  // 全屏半透明遮罩
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  // 标题
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd633';
  ctx.font = 'bold 44px -apple-system, sans-serif';
  ctx.fillText('堵桥模拟器', W / 2, H / 2 - 140);

  ctx.font = '16px -apple-system, sans-serif';
  ctx.fillStyle = '#ccc';
  ctx.fillText('乌鲁鲁 + 威龙 + 蜂医 vs 步枪手 & 狙击手', W / 2, H / 2 - 100);

  // 玩法提示
  ctx.font = '14px -apple-system, sans-serif';
  ctx.fillStyle = '#aaa';
  const hints = [
    '🖱  点屏幕任意位置 → 开枪',
    '🖱  点蜂医身上 → 释放烟雾（CD 40s / 持续 20s）',
    '⌨  R 键 → GAME OVER 后重开',
  ];
  hints.forEach((t, i) => ctx.fillText(t, W / 2, H / 2 - 50 + i * 22));

  // 开始按钮
  const b = START_BTN;
  ctx.fillStyle = '#7CFC00';
  ctx.strokeStyle = '#3a8800';
  ctx.lineWidth = 3;
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#0a2200';
  ctx.font = 'bold 24px -apple-system, sans-serif';
  ctx.fillText('▶  开始游戏', b.x + b.w / 2, b.y + b.h / 2);

  ctx.restore();
}

function startGame() {
  const t = performance.now();
  game.started     = true;
  game.startedAt   = t;
  game.nextSpawnAt = t + SPAWN_INTERVAL_MS;
  game.nextAllyFireAt = t + ALLY_FIRE_INTERVAL_MS;
  game.nextHealAt  = t + HEAL_INTERVAL_MS;
  game.smokeReadyAt = 0;
  game.smokeUntil   = 0;
}

function drawGameOver() {
  if (!game.over) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff5050';
  ctx.font = 'bold 56px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px -apple-system, sans-serif';
  ctx.fillText(game.overReason, W / 2, H / 2 - 10);
  ctx.font = '18px -apple-system, sans-serif';
  ctx.fillStyle = '#ffd633';
  const sec = Math.max(0, Math.floor((game.overAt - game.startedAt) / 1000));
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(sec % 60).padStart(2, '0');
  ctx.fillText('击杀 ' + game.kills + '   坚持 ' + mm + ':' + ss, W / 2, H / 2 + 30);
  ctx.fillStyle = '#7CFC00';
  ctx.font = 'bold 16px -apple-system, sans-serif';
  ctx.fillText('按 R 重新开始', W / 2, H / 2 + 70);
  ctx.restore();
}

// 敌人头顶的血条
function drawHpBar(e) {
  const box = enemyBox(e);
  const w = Math.max(40, box.right - box.left);
  const h = 6;
  const x = e.x - w / 2;
  const y = box.top - 12;
  const ratio = Math.max(0, e.hp / ENEMY_MAX_HP);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = ratio > 0.5 ? '#7CFC00' : ratio > 0.2 ? '#ffd633' : '#ff5050';
  ctx.fillRect(x, y, w * ratio, h);
}

// 命中后的红色闪光罩
function drawHitFlash(e) {
  if (!e.hitFlash) return;
  const dt = performance.now() - e.hitFlash;
  if (dt > 120) return;
  const box = enemyBox(e);
  ctx.save();
  ctx.globalAlpha = 1 - dt / 120;
  ctx.fillStyle = 'rgba(255,80,80,0.55)';
  ctx.fillRect(box.left, box.top, box.right - box.left, box.bottom - box.top);
  ctx.restore();
}

function drawEffects() {
  const now = performance.now();
  const alive = [];
  for (const fx of game.effects) {
    const age = now - fx.born;
    if (age > fx.life) continue;
    const t = age / fx.life;

    if (fx.kind === 'muzzle') {
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = '#fff8a8';
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, 14 * (1 - t * 0.4), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,170,50,0.85)';
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, 22 * (1 - t * 0.6), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (fx.kind === 'spark') {
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const r1 = 3, r2 = 12 + t * 8;
        ctx.beginPath();
        ctx.moveTo(fx.x + Math.cos(a) * r1, fx.y + Math.sin(a) * r1);
        ctx.lineTo(fx.x + Math.cos(a) * r2, fx.y + Math.sin(a) * r2);
        ctx.stroke();
      }
      ctx.restore();
    } else if (fx.kind === 'damage') {
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.font = `bold ${fx.head ? 22 : 16}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.fillStyle = fx.heal ? '#7CFC00' : (fx.head ? '#ff4d4d' : '#ffe066');
      const yy = fx.y - t * 30;
      ctx.strokeText(fx.text, fx.x, yy);
      ctx.fillText(fx.text, fx.x, yy);
      ctx.restore();
    } else if (fx.kind === 'healBeam') {
      // 绿色水枪光束 + 末端水花
      ctx.save();
      ctx.globalAlpha = 1 - t;
      const grad = ctx.createLinearGradient(fx.x1, fx.y1, fx.x2, fx.y2);
      grad.addColorStop(0, 'rgba(120,255,140,0.9)');
      grad.addColorStop(1, 'rgba(60,200,80,0.6)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 6 * (1 - t * 0.5);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(fx.x1, fx.y1);
      ctx.lineTo(fx.x2, fx.y2);
      ctx.stroke();
      // 末端绿色水花
      ctx.fillStyle = '#a8ff9a';
      for (let i = 0; i < 4; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 14;
        ctx.beginPath();
        ctx.arc(fx.x2 + Math.cos(a) * r, fx.y2 + Math.sin(a) * r, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    } else if (fx.kind === 'smoke') {
      // 烟雾团：在生命周期前 8% 渐入、后 15% 渐出，中间稳定
      let a;
      if (t < 0.08) a = t / 0.08;
      else if (t > 0.85) a = (1 - t) / 0.15;
      else a = 1;
      ctx.save();
      ctx.globalAlpha = 0.55 * a;
      ctx.fillStyle = '#cfd2d6';
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    alive.push(fx);
  }
  game.effects = alive;
}

function render() {
  drawScene();
  // 敌人（活着的画图+血条；倒下的画灰色）
  for (const e of game.enemies) {
    if (e.hp > 0) {
      drawSoldier(e.img, e.x, e.y, e.height, e.name, e.color);
      drawHeadZone(e);
      drawSniperMark(e);
      drawHitFlash(e);
      drawHpBar(e);
    } else {
      // 死亡残影：5 秒内逐渐淡出
      const age = performance.now() - (e.deadAt || 0);
      const t = Math.min(1, age / DEATH_FADE_MS);
      ctx.save();
      ctx.globalAlpha = 0.35 * (1 - t);
      drawSoldier(e.img, e.x, e.y, e.height);
      ctx.restore();
    }
  }
  // 玩家
  drawSoldier(game.imgs.green, game.player.x, game.player.y, SOLDIER_HEIGHT,
              PLAYER_NAME + '（你）', '#7CFC00');
  // 蜂医
  if (game.medic && game.medic.hp > 0) {
    drawSoldier(game.medic.img, game.medic.x, game.medic.y, MEDIC_HEIGHT,
                MEDIC_NAME + '（奶妈）', '#a8ff9a');
  }
  // 子弹与特效
  drawBullets();
  drawEffects();
  // HUD（最后画，盖在最上面）
  drawHUD();
  drawGameOver();
  drawStartMenu();
}

// 每个终点最多容纳几个活着的敌人（由调节面板实时控制）
let MAX_PER_ANCHOR = 2;
// 敌人死亡后残影保留多久（毫秒）
const DEATH_FADE_MS = 5000;

// 数一下每个终点位置上现在站着多少个还活着的敌人
function countLivingPerAnchor() {
  const n = game.anchors.length;
  const counts = new Array(n).fill(0);
  for (const e of game.enemies) {
    if (e.hp <= 0 || e.anchorIdx == null) continue;
    counts[e.anchorIdx]++;
  }
  return counts;
}

// 从右边刷新一波敌人：每个终点最多 MAX_PER_ANCHOR 个，满了就跳过
function spawnEnemyWave() {
  if (!game.enemyImgs.length || !game.anchors.length) return;
  const counts = countLivingPerAnchor();
  const stagger = [0, 30, 60];
  game.anchors.forEach((anchor, i) => {
    if (counts[i] >= MAX_PER_ANCHOR) return; // 这个位置已满，等玩家清掉再刷
    const img = game.enemyImgs[Math.floor(Math.random() * game.enemyImgs.length)];
    const e = {
      img, x: W + 40 + stagger[i], y: anchor.y,
      height: ENEMY_HEIGHT, name: null, color: null,
      hp: ENEMY_MAX_HP, hitFlash: 0,
      state: 'walking',
      anchorIdx: i,
      anchor: { x: anchor.x, y: anchor.y },
      idle: { baseY: anchor.y, vy: 0, lastChange: 0 },
    };
    applyEnemyKind(e, nextEnemyKind());
    game.enemies.push(e);
  });
}

// 友方目标包围盒（玩家或队友），用 SOLDIER_HEIGHT 紧密框
function friendlyBox(target) {
  const img = target === game.player ? game.imgs.green : game.ally.img;
  const W0 = img.naturalWidth, H0 = img.naturalHeight;
  const Wd = SOLDIER_HEIGHT * (W0 / H0);
  const drawnLeft = target.x - Wd / 2;
  const drawnTop  = target.y - SOLDIER_HEIGHT / 2;
  const t = img._tight || { topR: 0, botR: 1, leftR: 0, rightR: 1 };
  const left = drawnLeft + Wd * t.leftR;
  const right = drawnLeft + Wd * t.rightR;
  const top  = drawnTop + SOLDIER_HEIGHT * t.topR;
  const bottom = drawnTop + SOLDIER_HEIGHT * t.botR;
  return { left, right, top, bottom, headBottom: top + (bottom - top) * HEAD_RATIO };
}

// 蜂医每 10 秒同时给乌鲁鲁和威龙各加 HEAL_AMOUNT 滴血
function medicHeal() {
  if (!game.medic || game.medic.hp <= 0) return;
  const sx = game.medic.x, sy = game.medic.y;
  const targets = [
    { who: game.player, label: '乌鲁鲁', max: PLAYER_MAX_HP },
    { who: game.ally,   label: '威龙',   max: ALLY_MAX_HP   },
  ];
  for (const { who, max } of targets) {
    if (!who || who.hp <= 0) continue;
    const before = who.hp;
    who.hp = Math.min(max, who.hp + HEAL_AMOUNT);
    const real = who.hp - before;
    if (real > 0) {
      // 绿色水枪光束
      spawnEffect({ kind: 'healBeam', x1: sx, y1: sy, x2: who.x, y2: who.y - SOLDIER_HEIGHT * 0.2, life: 600 });
      // 治疗飘字
      spawnEffect({ kind: 'damage', x: who.x, y: who.y - SOLDIER_HEIGHT * 0.45,
                    text: '+' + real, head: false, life: 800, heal: true });
    }
  }
}

// 玩家点击蜂医触发烟雾技能
function tryActivateSmoke() {
  const now = performance.now();
  if (now < game.smokeReadyAt) return false; // 冷却中
  game.smokeUntil   = now + SMOKE_DURATION_MS;
  game.smokeReadyAt = now + SMOKE_COOLDOWN_MS;
  // 在画面右半边敌人区域撒一片烟
  for (let i = 0; i < 30; i++) {
    spawnEffect({
      kind: 'smoke',
      x: BRIDGE_X + BRIDGE_WIDTH + 40 + Math.random() * (W - BRIDGE_X - BRIDGE_WIDTH - 60),
      y: 200 + Math.random() * 400,
      r: 30 + Math.random() * 30,
      life: SMOKE_DURATION_MS,
    });
  }
  return true;
}

function isSmokeActive() {
  return performance.now() < game.smokeUntil;
}

// 敌人开火：随机锁定玩家或队友，按命中分布选 爆头/身体/空枪（烟雾期间分布更差）
function enemyFire(e) {
  // 候选目标：还活着的玩家与队友
  const candidates = [];
  if (game.player.hp > 0) candidates.push(game.player);
  if (game.ally && game.ally.hp > 0) candidates.push(game.ally);
  if (!candidates.length) return;
  const target = candidates[Math.floor(Math.random() * candidates.length)];

  const r = Math.random();
  const headP = isSmokeActive() ? SMOKE_HIT_HEAD_PROB : ENEMY_HIT_HEAD_PROB;
  const bodyP = isSmokeActive() ? SMOKE_HIT_BODY_PROB : ENEMY_HIT_BODY_PROB;
  let mode; // 'head' | 'body' | 'miss'
  if (r < headP) mode = 'head';
  else if (r < headP + bodyP) mode = 'body';
  else mode = 'miss';

  const muzzleX = e.x;
  const muzzleY = e.y - ENEMY_HEIGHT * 0.2;
  const tbox = friendlyBox(target);
  let aimX = (tbox.left + tbox.right) / 2;
  let aimY = mode === 'head'
    ? tbox.top + (tbox.bottom - tbox.top) * HEAD_RATIO * 0.5
    : (tbox.top + tbox.bottom) / 2 + (tbox.bottom - tbox.top) * 0.15;
  if (mode === 'miss') {
    aimX += (Math.random() < 0.5 ? -1 : 1) * (50 + Math.random() * 60);
    aimY += (Math.random() < 0.5 ? -1 : 1) * (35 + Math.random() * 30);
  }
  const dx = aimX - muzzleX, dy = aimY - muzzleY;
  const dist = Math.hypot(dx, dy) || 1;
  game.bullets.push({
    x: muzzleX, y: muzzleY,
    vx: (dx / dist) * ENEMY_BULLET_SPEED,
    vy: (dy / dist) * ENEMY_BULLET_SPEED,
    team: 'enemy',
    shooter: e,
    targetWho: target === game.player ? 'player' : 'ally',
    mode, // hit/head/body/miss
    harmless: mode === 'miss', // 空枪：碰撞检测一律跳过
  });
  spawnEffect({ kind: 'muzzle', x: muzzleX, y: muzzleY, life: 90 });
}

function updateEnemies() {
  const now = performance.now();
  for (const e of game.enemies) {
    if (e.hp <= 0 || !e.state) continue; // 桥上的威龙(队友)由 allyFire 处理
    if (e.state === 'walking') {
      const dx = e.anchor.x - e.x;
      if (Math.abs(dx) <= ENEMY_WALK_SPEED) {
        e.x = e.anchor.x;
        e.state = 'idle';
        e.idle.lastChange = now;
      } else {
        e.x += Math.sign(dx) * ENEMY_WALK_SPEED;
      }
    } else if (e.state === 'idle') {
      // 每 0.8~1.6 秒随机换一次方向（上、下、停）
      if (now - e.idle.lastChange > 800 + Math.random() * 800) {
        const choices = [-IDLE_SPEED, 0, IDLE_SPEED];
        e.idle.vy = choices[Math.floor(Math.random() * 3)];
        e.idle.lastChange = now;
      }
      e.y += e.idle.vy;
      // 限制在锚点上下 ±IDLE_RANGE 范围
      if (e.y > e.idle.baseY + IDLE_RANGE) {
        e.y = e.idle.baseY + IDLE_RANGE; e.idle.vy = -Math.abs(e.idle.vy);
      } else if (e.y < e.idle.baseY - IDLE_RANGE) {
        e.y = e.idle.baseY - IDLE_RANGE; e.idle.vy =  Math.abs(e.idle.vy);
      }
      // 就位的敌人按各自的开火节奏射击
      if (e.nextFireAt && now >= e.nextFireAt) {
        enemyFire(e);
        e.nextFireAt = now + ENEMY_FIRE_INTERVAL_MS * (0.8 + Math.random() * 0.4);
      }
    }
  }
}

function loop() {
  if (game.started && !game.over) {
    const now = performance.now();
    if (now >= game.nextSpawnAt) {
      spawnEnemyWave();
      game.nextSpawnAt = now + SPAWN_INTERVAL_MS;
    }
    if (game.ally && game.ally.hp > 0 && now >= game.nextAllyFireAt) {
      allyFire();
      game.nextAllyFireAt = now + ALLY_FIRE_INTERVAL_MS;
    }
    if (game.medic && game.medic.hp > 0 && now >= game.nextHealAt) {
      medicHeal();
      game.nextHealAt = now + HEAL_INTERVAL_MS;
    }
    game.enemies = game.enemies.filter(e =>
      e.hp > 0 || (e.deadAt && now - e.deadAt < DEATH_FADE_MS)
    );
    updateEnemies();
    updateBullets();
  }
  render();
  requestAnimationFrame(loop);
}

// 按 R 重新开始
window.addEventListener('keydown', (e) => {
  if (game.over && (e.key === 'r' || e.key === 'R')) {
    location.reload();
  }
});

// 把鼠标点击的页面坐标，换算成 canvas 内部坐标
function canvasPoint(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * (W / rect.width),
    y: (evt.clientY - rect.top)  * (H / rect.height),
  };
}

canvas.addEventListener('mousedown', (e) => {
  if (game.over) return;
  const p = canvasPoint(e);
  // 开始菜单：点中"开始"按钮（或屏幕任何地方）即开局
  if (!game.started) {
    const b = START_BTN;
    if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
      startGame();
    }
    return;
  }
  // 点蜂医 = 释放烟雾（不开枪）
  if (game.medic && game.medic.hp > 0) {
    const m = game.medic;
    const W0 = m.img.naturalWidth, H0 = m.img.naturalHeight;
    const Wd = MEDIC_HEIGHT * (W0 / H0);
    const left = m.x - Wd / 2, right = m.x + Wd / 2;
    const top  = m.y - MEDIC_HEIGHT / 2, bottom = m.y + MEDIC_HEIGHT / 2;
    if (p.x >= left && p.x <= right && p.y >= top && p.y <= bottom) {
      tryActivateSmoke();
      return;
    }
  }
  spawnBullet(p.x, p.y);
});

// ====== 调节面板：滑杆 / 数字框 / 显示爆头区 ======
const headRange  = document.getElementById('headRange');
const headNumber = document.getElementById('headNumber');
const headPct    = document.getElementById('headPct');
const showHeadZone = document.getElementById('showHeadZone');

function setHeadRatio(v) {
  v = Math.max(0, Math.min(1, Number(v) || 0));
  HEAD_RATIO = v;
  headRange.value = v.toFixed(2);
  headNumber.value = v.toFixed(2);
  headPct.textContent = Math.round(v * 100) + '%';
}
headRange.addEventListener('input',  () => setHeadRatio(headRange.value));
headNumber.addEventListener('input', () => setHeadRatio(headNumber.value));
showHeadZone.addEventListener('change', () => { SHOW_HEAD_ZONE = showHeadZone.checked; });
setHeadRatio(HEAD_RATIO);

// 每位最多几个：滑杆 + 数字框互相同步
const maxPerRange  = document.getElementById('maxPerRange');
const maxPerNumber = document.getElementById('maxPerNumber');
const maxPerPct    = document.getElementById('maxPerPct');
function setMaxPerAnchor(v) {
  v = Math.max(1, Math.min(20, Math.round(Number(v) || 1)));
  MAX_PER_ANCHOR = v;
  if (Number(maxPerRange.value) !== v && v <= Number(maxPerRange.max)) maxPerRange.value = v;
  if (Number(maxPerNumber.value) !== v) maxPerNumber.value = v;
  maxPerPct.textContent = v + ' 个';
}
maxPerRange.addEventListener('input',  () => setMaxPerAnchor(maxPerRange.value));
maxPerNumber.addEventListener('input', () => setMaxPerAnchor(maxPerNumber.value));
setMaxPerAnchor(MAX_PER_ANCHOR);

function drawHeadZone(e) {
  if (!SHOW_HEAD_ZONE || e.hp <= 0) return;
  const box = enemyBox(e);
  const headH = (box.bottom - box.top) * HEAD_RATIO;
  ctx.save();
  ctx.fillStyle = 'rgba(255, 80, 80, 0.22)';
  ctx.strokeStyle = 'rgba(255, 80, 80, 0.85)';
  ctx.lineWidth = 1.5;
  ctx.fillRect(box.left, box.top, box.right - box.left, headH);
  ctx.strokeRect(box.left, box.top, box.right - box.left, headH);
  ctx.restore();
}

// ====== 启动 ======
Promise.all([
  loadImage(SOLDIER_YELLOW_DATA),
  loadImage(SOLDIER_GREEN_DATA),
  loadImage(ENEMY_1_DATA),
  loadImage(ENEMY_2_DATA),
  loadImage(ENEMY_3_DATA),
  loadImage(MEDIC_DATA),
]).then(([yellow, green, e1, e2, e3, medicImg]) => {
  game.imgs = { yellow, green, medic: medicImg };

  const bridgeCenterX = BRIDGE_X + BRIDGE_WIDTH / 2;
  const northY = 200 + 70;
  const southY = 600 - 70;

  // 玩家·乌鲁鲁
  game.player.x = bridgeCenterX;
  game.player.y = southY;

  // 桥北队友·威龙（不是敌人，是我们的队友）
  const ally = {
    img: yellow, x: bridgeCenterX, y: northY,
    height: SOLDIER_HEIGHT, name: ENEMY_NAME + '（队友）', color: '#5ad6ff',
    hp: ALLY_MAX_HP, maxHp: ALLY_MAX_HP, hitFlash: 0,
    friendly: true,
  };
  game.enemies.push(ally);
  game.ally = ally;
  game.player.hp = PLAYER_MAX_HP;

  // 桥中央·奶妈蜂医（在乌鲁鲁和威龙中间）
  game.medic = {
    img: medicImg,
    x: bridgeCenterX,
    y: (northY + southY) / 2,
    hp: 1, maxHp: 1,  // 标记存活，目前敌人不会主动打他（设计简化）
    friendly: true,
  };

  // 三个埋伏敌人（站在三个掩体右边）
  const bx = BRIDGE_X;
  const riverY = 200, riverH = 400;
  const coverSize = 80, coverGap = 80, offsetX = 40;
  const baseX  = bx + BRIDGE_WIDTH + offsetX + coverSize + coverGap;
  const midY   = riverY + riverH / 2;
  const topY   = midY - coverSize - coverGap / 2;
  const botY   = midY + coverGap / 2;
  const frontX = bx + BRIDGE_WIDTH + offsetX;
  const frontY = midY - coverSize / 2;
  const ENEMY_GAP = 14;
  const standRight = (cx, cy) => ({
    x: cx + coverSize + ENEMY_GAP + ENEMY_HEIGHT * 0.25,
    y: cy + coverSize / 2,
  });
  const enemyDefs = [
    { img: e1, ...standRight(frontX, frontY) },
    { img: e2, ...standRight(baseX,  topY)   },
    { img: e3, ...standRight(baseX,  botY)   },
  ];
  enemyDefs.forEach((d, i) => {
    const e = {
      ...d, height: ENEMY_HEIGHT, name: null, color: null,
      hp: ENEMY_MAX_HP, hitFlash: 0,
      anchorIdx: i,
      state: 'idle',  // 初始三个直接就位、能开枪
      idle: { baseY: d.y, vy: 0, lastChange: 0 },
      anchor: { x: d.x, y: d.y },
    };
    applyEnemyKind(e, nextEnemyKind());
    game.enemies.push(e);
  });

  // 把三种敌人贴图和三个终点位置记下来，给刷新逻辑用
  game.enemyImgs = [e1, e2, e3];
  game.anchors = enemyDefs.map(d => ({ x: d.x, y: d.y }));
  // 注意：不在这里直接开始游戏；进入开始菜单等用户点击"开始"
  requestAnimationFrame(loop);
});
</script>
